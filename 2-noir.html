        function pageInIframe() {
            return (window.location !== window.parent.location);
        }

        let forgetPop = true;
        function onPopState(event) {
            if(forgetPop){
                forgetPop = false;
            } else if( pageInIframe()) {
                parent.postMessage(event.target.location.href, "app://obsidian.md");
            }
        }
        window.onpopstate = onPopState;
        window.onmessage = event => {
            if(event.data == "reload"){
                window.document.location.reload();
            }
            forgetPop = true;
        }

        function fitElements() {
            const itemsToFit = document.getElementsByClassName('fitText');
            for (const item in itemsToFit) {
                if (Object.hasOwnProperty.call(itemsToFit, item)) {
                    const element = itemsToFit[item];
                    fitElement(element, 1, 1000);
                    element.classList.remove('fitText');
                }
            }
        }

        function fitElement(element, start, end) {

            let size = (end + start) / 2;
            element.style.fontSize = `${size}px`;

            if (Math.abs(start - end) < 1) {
                while (element.scrollHeight > element.offsetHeight) {
                    size--;
                    element.style.fontSize = `${size}px`;
                }
                return;
            }

            if (element.scrollHeight > element.offsetHeight) {
                fitElement(element, start, size);
            } else {
                fitElement(element, size, end);
            }
        }

        document.onreadystatechange = () => {
            fitElements();
            if (document.readyState === 'complete') {
                if (pageInIframe() && window.location.href.indexOf("?export") != -1){
                    parent.postMessage(event.target.location.href, "app://obsidian.md");
                }
                if (window.location.href.indexOf("print-pdf") != -1){
                    let stateCheck = setInterval(() => {
                        clearInterval(stateCheck);
                        window.print();
                    }, 250);
                }
            }
        };

## Kapitalismus und Versicherung
- Amerikanischer Traum und Ölindustrie
- Unfallversicherung: Statistik und Spekulation
- Versicherungsagent verdrängt Detektiv und Polizei
- Verbrechen und Aufklärung verdanken sich der Logik des Kapitalismus


</div>
</div>

<aside class="notes"><ul>
<li>Ehemann nicht mehr liquide, seit er ins Ölgeschäft einstieg (Erbe allein würde nichts bringen)</li>
<li>daher Unfallversicherung nötig (Statistik und Spekulation: Unwahrscheinlichkeit eines Unfalltodes wird „kapitalisiert” → Höhe der Prämie)</li>
<li>Anreiz für Versicherungsagenten: Verdopplung der Prämie bei besonders unwahrscheinlichem Unfall (Zugunglück) – Verdopplung und Spekularität: kehrt im doppelten double cross wieder</li>
<li>Versicherungsanstalt als aufklärende Instanz aus ökonomischem Interesse (im ganzen Film keine Rede von polizeilicher Investigation)</li>
<li>Verbrechen und Aufklärung verdanken sich beide der Logik des Kapitalismus/der Spekulation – wird von Figuren als moralischer Niedergang teilweise reflektiert („how rotten we are”)</li>
</ul>

## Gender: Walter und Phyllis
- Phyllis: stereotype femme fatale?
- Walter: naiver Antiheld?
- ein Verbrechen aus Leidenschaft?
- erste Begegnung
	- Inszenierung von Weiblichkeit und männlichem Blick
	- hardboiled style dialogue


</div>
</div>

<aside class="notes"><ul>
<li><h3 id="heterosexuell">Heterosexuell</h3>
<ul>
<li>Phyllis als femme fatale: selbständig, setzt Erotik als Waffe ein, hat offenbar die erste Ehefrau ihres Manns umgebracht; aber: ihre Erotik ist nur Initialzündung; </li>
<li>Walter scheint weniger von ihr fasziniert als von der Idee des perfekten Verbrechens, der doppelten Prämie und der Gelegenheit, Keyes zu übertrumpfen</li>
<li>Walter als Antiheld; ohne soziale Bindungen (außer Keyes); berechnend und naiv?</li>
<li>Inszenierung von Weiblichkeit und „männlichem Blick” in der ersten Begegnung: <strong>CLIP ANSEHEN</strong> <ul>
<li>Neffs Blick wandert an Phyllis’ Körper entlang – Fußkettchen, Beine, Gesicht. Das ist klassisch voyeuristischer Blick (<em>male gaze</em> nach Mulvey), der ein erotisches Objekt konstitutiert (Agent, Vergegenständlichung, Abhängigkeit und Unterlegenheit als konstruiert). </li>
<li>Entscheidend ist aber, was Wilder dann tut: Phyllis erwidert den Blick direkt, was desorientieren wirkt. Die Kamera, die eigentlich maskuline Kontrollinstanz, wird selbst als instrumentalisierbar entlarvt – Phyllis nutzt das Blickregime.</li>
<li>still: <a href="https://criterion-production.s3.amazonaws.com/carousel-files/CZxEhQggbssSVzydxloXdjufl6IN7uAxY9fOB7XI.jpeg">Walter und Phyllis gegenüber, Jalousien werfen Schatten</a></li>
</ul>
</li>
<li>das <a href="https://film-grab.com/wp-content/uploads/photo-gallery/Double_Indemnity_047.jpg?bwg=1598952474">Spiel mit hierarchischen Positionen</a> bei der zweiten Begegnung (Walter verbirgt seine Faszination, Phyllis spielt ihre Abhängigkeit, beide inszenieren Leidenschaft/Dialoge/double entendre)</li>
</ul>
</li>
</ul>

<aside class="notes"><h1 id="filmstills">Filmstills</h1>
<pre><code class="language-dataviewjs">const page = dv.current();
const lists = (page.file?.lists ?? []);

const urls = new Set();
const re = /\((https?:\/\/&lt;sup id=&quot;fnref:\s)&quot; role=&quot;doc-noteref&quot;&gt;1&lt;/sup&gt;+)\)/g;

for (const li of lists) {
  const text = li?.text ?? &quot;&quot;;
  let m;
  while ((m = re.exec(text)) !== null) urls.add(m[1]);
}

const sorted = [...urls].sort();

dv.table(
  [&quot;Vorschau&quot;, &quot;URL&quot;],
  sorted.map(u =&gt; [
    dv.el(&quot;img&quot;, &quot;&quot;, { attr: { src: u, style: &quot;max-height:150px; max-width:300px;&quot; } }),
    dv.el(&quot;a&quot;, &quot;URL&quot;, { attr: { class: &quot;figcaption&quot;, href: u, target: &quot;_blank&quot;, rel: &quot;noopener&quot; } })
  ])
);
</code></pre>

    <script>
        function extend() {
            const target = {};
            for (let i = 0; i < arguments.length; i++) {
                const source = arguments[i];
                for (const key in source) {
                    if (source.hasOwnProperty(key)) {
                        target[key] = source[key];
                    }
                }
            }
            return target;
        }

        function isLight(color) {
            // normalize to rgb(a)
            const optionEl = document.createElement("option");
            optionEl.style.color = color;
            const normalizedColor = optionEl.style.color;

            const [_, c_r, c_g, c_b] = normalizedColor.match(/(\d+), (\d+), (\d+)/);

            const brightness = ((c_r * 299) + (c_g * 587) + (c_b * 114)) / 1000;
            return brightness > 155;
        }

        const bgColor = getComputedStyle(document.documentElement).getPropertyValue('--r-background-color').trim();

        if (isLight(bgColor)) {
            document.body.classList.add('has-light-background');
        } else {
            document.body.classList.add('has-dark-background');
        }

        // default options to init reveal.js
        const defaultOptions = {
            controls: true,
            progress: true,
            history: true,
            center: true,
            transition: 'default', // none/fade/slide/convex/concave/zoom
            plugins: [
