- der Pfeil ohne Ziel: „es wurde alles schon gesagt”
- Verhältnis Worte/Dinge: Ablösung vom „aptum”
- concetto und acutezza (pointierter, frappierender Ausdruck vs. mimetische Repräsentation; Pfeil als deren Sinnbild auch bei Ovid); 
- auch rhetorisch Freude an der Verzerrung (ungewöhnliche, befremdliche Bilder) →  Paralogismus
- = postmodernes Sprachbewusstsein?

</div>
</div>

## Aristoteles, *Poetik*, c. 21

<!-- begin::[Aristoteles – Analogie-Metapher.md] -->
- ["] Unter einer Analogie verstehe ich eine Beziehung, in der sich die zweite Größe zur ersten ähnlich verhält wie die vierte zur dritten. Dann verwendet der Dichter statt der zweiten Größe die vierte oder statt der vierten die zweite; und manchmal fügt man hinzu, auf was sich die Bedeutung bezieht, für die das Wort eingesetzt ist. So verhält sich z. B. eine Schale ähnlich zu Dionysos wie ein Schild zu Ares; der Dichter nennt also die Schale »Schild des Dionysos« und den Schild »Schale des Ares« \[…\]. (Aristoteles, *Poetik*, c. 21, 1457b16–25)
<!-- end::[Aristoteles – Analogie-Metapher.md] -->

<!-- begin::[Aristoteles – Analogie-Metapher.md] -->
- ["] In manchen Fällen fehlt eine der Bezeichnungen, auf denen die Analogie beruht; nichtsdestoweniger verwendet man den analogen Ausdruck. So heißt z. B. das Ausstreuen von Samen »säen«; für die Tätigkeit der Sonne hingegen, die ihr Licht ausstreut, gibt es keine spezielle Bezeichnung. Doch verhält sich diese Tätigkeit ähnlich zum Sonnenlicht wie das Säen zum Samen; man hat daher gesagt: »Säend das göttliche Licht«. (Aristoteles, *Poetik*, c. 21, 1457b25–30) 
<!-- end::[Aristoteles – Analogie-Metapher.md] -->

## Lerneffekt der Metapher

- ["] »Smart and popular sayings« können entweder »by genius« oder durch Übung hervorgebracht werden. »Easy learning is naturally pleasant to all, and words mean something, so that all words which make us learn something are most pleasant. … It is metaphor, therefore, that above all produces this effect … all style and enthymemes that give us rapid information are smart« (Aristoteles, _Rhetorik_ 3,10,1-4)

- ["] Most smart sayings are derived from metaphor, and also from misleading the hearer beforehand. For it becomes more evident to him that he has learnt something, when the conclusion turns out contrary to his expectation. (Aristoteles, *Rhetorik*, 3,11,6)

## Aristoteles/Tesauro: Metapher und Paralogismus

<!-- begin::[@Aristoteles-2006.md] -->
- ["] Ursache hiervon ist folgendes: Das Lernen bereitet nicht nur den Philosophen großes Vergnügen, sondern in ähnlicher Weise auch den übrigen Menschen \[…\]. Sie freuen sich also deshalb über den Anblick von Bildern, weil sie beim Betrachten etwas lernen und zu erschließen suchen, was ein jedes sei, z.B. dass diese Gestalt den und den darstelle. (c. 4, 1448b13, S. 11f.)
<!-- end::[@Aristoteles-2006.md] -->


<!-- begin::[Tesauro -CA- Paralogismus und Portrait.md] -->
- ["] »Wenn du das vollkommene Abbild einer bekannten Person betrachtest, begehst du selbst einen Trugschluss, indem du das Wahrscheinliche mit dem Wahren gleichsetzt und daraus folgerst: _Das ist wirklich jener_. Wenn du jedoch später über deinen Irrtum und über die Kunstfertigkeit des Schöpfers nachdenkst, erfreust du dich daran und spendest Beifall.« (CA 12)
<!-- end::[Tesauro -CA- Paralogismus und Portrait.md] -->


<!-- begin::[Tesauro -CA- Paralogismus.md] -->
- ["] Und dies ist jener Paralogismus, den unser Autor als „schöne Lüge der Dichter“ bezeichnet und den uns der gute Homer gelehrt hat. Denn auf diesem Paralogismus gründet sich die gesamte Kunst der göttlichen Dichter und Maler; und der vollkommenste Dichter und Maler ist derjenige, der uns am besten dazu zu bringen versteht, uns täuschen zu lassen, indem er uns das Wahrscheinliche als wahr ausgibt. (CA 641; vgl. 491)
<!-- end::[Tesauro -CA- Paralogismus.md] -->

- Verhältnis Narziss/Echo, Malerei/Sprache

<li>7a: recht einfach und deutlich; Beispiel für Chiasmus</li>
<li>7b: deutlich komplexer: „auf die Leinwand, in die das Bild gewoben ist, starrt verblüfft die Natur, um sich […] selbst zu bewundern”</li>

<li>8: hier wird ausdrücklich auf die Stummheit Echos (auch im Gemälde) hingewiesen („Stimme kann man nicht malen” als Lob für die lebendige Darstellung)</li>

            const normalizedColor = optionEl.style.color;

            const [_, c_r, c_g, c_b] = normalizedColor.match(/(\d+), (\d+), (\d+)/);

            const brightness = ((c_r * 299) + (c_g * 587) + (c_b * 114)) / 1000;
            return brightness > 155;
        }

        const bgColor = getComputedStyle(document.documentElement).getPropertyValue('--r-background-color').trim();

        if (isLight(bgColor)) {
            document.body.classList.add('has-light-background');
        } else {
            document.body.classList.add('has-dark-background');
        }

        // default options to init reveal.js
        const defaultOptions = {
            controls: true,
            progress: true,
            history: true,
            center: true,
            transition: 'default', // none/fade/slide/convex/concave/zoom
            plugins: [
                ObsidianMarkdown,
                RevealHighlight,
                RevealZoom,
                RevealNotes,
                RevealMath.KaTeX,
                RevealMermaid,
                RevealChart,
                RevealCustomControls,
                RevealMenu,
            ],
            allottedTime: "120",

            katex: {
                local: 'plugin/math/katex',
                extensions: ["mhchem"],
            },
            markdown: {
                gfm: true,
            },
            mermaid: {
                theme: isLight(bgColor) ? 'default' : 'dark',
            },
            customcontrols: {
                controls: [
                ]
            },
            menu: {
                loadIcons: false
            },
        };

        if ( pageInIframe() ) {
            defaultOptions.scrollActivationWidth = 5;
        }

        // options from URL query string
        const queryOptions = Reveal().getQueryHash() || {};

        const options = extend(defaultOptions, {"controls":true,"progress":true,"slideNumber":true,"center":false,"transition":"slide","transitionSpeed":"default","width":1920,"height":1080,"margin":0.04}, queryOptions);
    </script>

       */
      
      Reveal.initialize(options);
