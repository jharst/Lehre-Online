            let size = (end + start) / 2;

                while (element.scrollHeight > element.offsetHeight) {
                    size--;

                }
                return;
            }

            if (element.scrollHeight > element.offsetHeight) {
                fitElement(element, start, size);
            } else {
                fitElement(element, size, end);
            }
        }

„Quae cum ita sint, consuevi inter familiares dicere picturae inventorem fuisse, poetarum sententia, Narcissum illum qui sit in florem versus, nam cum sit omnium artium flos pictura, tum de Narcisso omnis fabula pulchre ad rem ipsam perapta erit. Quid est enim aliud pingere quam arte superficiem illam fontis amplecti?”

„Weil dem so ist, pflege ich nach einer Redeweise der Dichter zu meinen Freunden zu sagen, jener Narziss, der in eine Blume verwandelt wurde, sei der Erfinder der Malerei gewesen. Da die Malerei zum einen die Blume aller Künste ist, passt die Erzählung von Narziß auch sonst gut zur Sache. Was nämlich ist das Malen anderes, als durch die Kunst jene Oberfläche der Quelle zu umarmen?”

Text: L.B. Alberti, De pictura (1436), 2,26. Bild: Caravaggio: Narziss (1597–1599). Öl auf Leinwand. Galleria Nazionale d’Arte Antica, Rom

## Alberti: *De pictura* (1435/36)
- Kontext: ital. Renaissance, Humanismus (15. Jhdt.)
- geometrische Grundlagen der Perspektive
	- das Gemälde als „Querschnitt durch die Sehpyramide”
	- Zentralperspektive, Fluchtpunkt
	- Übersetzungsmittel: Fadengitter
- das Gemälde als Fenster
- Nachahmung und Konstruktion


</div>
</div>

<aside class="notes"><h2 id="alberti-und-zentralperspektive">Alberti und Zentralperspektive</h2>
<ul>
<li>Einordnung: Alberti (1404–1472) und italienische Renaissance (15. Jhdt.) – <em>De pictura</em> (1435/36)</li>
<li>– löst das Problem, wie ein dreidimensionales Objekt auf einer zweidimensionalen Fläche abgebildet werden kann.</li>
<li>das Gemälde als Fenster/Spiegel, der Spiegel als Kunstrichter</li>
<li><a href="https://upload.wikimedia.org/wikipedia/commons/c/cc/Zentralperspektive_zeichnen.png">Fadengitter auf altem Stich (1710)</a></li>
<li>künstlerische Maximen- Zentralperspektive = geometrische Rationalisierung der Natur, Ausschluss von verzerrenden Faktoren/Reflexen; die Mimesis ist immer auch Konstruktion</li>
<li>Zusammenhang mit Renaissance-Idealen und Humanismus (der Mensch als Maß der Dinge)</li>
</ul>

## Umsetzung von Albertis Vorgaben
- Fluchtpunkt
- Horizontlinie
- Rastersystem auf dem Boden
- Raumtiefe durch Staffelung
- Fenster zur Welt
</div>

 <!-- .element: style="background: #DFE1E175; border-radius: 5px; padding: 20px; position: absolute; left: 0%; top: 10%; height: 80%; width: 50%; display: flex; flex-direction: column; align-items: start; justify-content: center" class="fragment" data-fragment-index="1" -->



<div class="right-image-source"><a href="https://de.wikipedia.org/wiki/Die_Schule_von_Athen" title="Raffael: Die Schule von Athen. Fresko, Stanzen des Raffael, Vatikan. " target="_blank">Raffael: Die Schule von Athen.<i class="fas fa-external-link-alt link-icon"></i></a></div>
</div>

<aside class="notes"><ul>
<li><strong>Fluchtpunkt &amp; Horizontlinie</strong> Der Fluchtpunkt liegt exakt zwischen Platon und Aristoteles im Zentrum – alle Linien der Architektur (Bögen, Bodenfliesen) laufen dort zusammen. Die Horizontlinie verläuft auf Augenhöhe der dargestellten Figuren.</li>
<li><strong>Costruzione legittima</strong> Rafael verwendet Albertis „legitime Konstruktion&quot;: ein mathematisch exaktes Rastersystem auf dem Boden, das die Tiefe des Raumes messbar und nachvollziehbar macht.</li>
<li><strong>Raumtiefe durch Staffelung</strong> Die Figuren werden nach hinten hin kleiner und weichen dem Fluchtpunkt – genau wie Alberti es im <em>„Sehpyramiden-Modell&quot;</em> beschreibt.</li>
<li><strong>Historischer Bezug</strong> Alberti forderte, Malerei solle ein <em>„offenes Fenster zur Welt&quot;</em> sein – Rafaels Fresko wirkt wie ein solches Fenster in einen antiken Philosophentempel.</li>
</ul>

    <script>
        function extend() {
            const target = {};
            for (let i = 0; i < arguments.length; i++) {
                const source = arguments[i];
                for (const key in source) {
                    if (source.hasOwnProperty(key)) {
                        target[key] = source[key];
                    }
                }
            }
            return target;
        }

        function isLight(color) {
            // normalize to rgb(a)
            const optionEl = document.createElement("option");
            optionEl.style.color = color;
            const normalizedColor = optionEl.style.color;

            const [_, c_r, c_g, c_b] = normalizedColor.match(/(\d+), (\d+), (\d+)/);

            const brightness = ((c_r * 299) + (c_g * 587) + (c_b * 114)) / 1000;
            return brightness > 155;
        }

        const bgColor = getComputedStyle(document.documentElement).getPropertyValue('--r-background-color').trim();

        if (isLight(bgColor)) {
            document.body.classList.add('has-light-background');
        } else {
            document.body.classList.add('has-dark-background');
        }

        // default options to init reveal.js
        const defaultOptions = {
            controls: true,
            progress: true,
            history: true,
            center: true,
            transition: 'default', // none/fade/slide/convex/concave/zoom
            plugins: [
                ObsidianMarkdown,
                RevealHighlight,
                RevealZoom,
                RevealNotes,
                RevealMath.KaTeX,
                RevealMermaid,
                RevealChart,
                RevealCustomControls,
                RevealMenu,
            ],
            allottedTime: "120",

            katex: {
                local: 'plugin/math/katex',
                extensions: ["mhchem"],
            },
            markdown: {
                gfm: true,
            },
            mermaid: {
                theme: isLight(bgColor) ? 'default' : 'dark',
            },
            customcontrols: {
                controls: [
                ]
            },
            menu: {
                loadIcons: false
            },
        };

        if ( pageInIframe() ) {
            defaultOptions.scrollActivationWidth = 5;
        }

        // options from URL query string
        const queryOptions = Reveal().getQueryHash() || {};

        const options = extend(defaultOptions, {"controls":true,"progress":true,"slideNumber":true,"center":false,"transition":"slide","transitionSpeed":"default","width":1920,"height":1080,"margin":0.04}, queryOptions);
    </script>
