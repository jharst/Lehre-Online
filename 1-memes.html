    <script type="text/javascript">
        function pageInIframe() {
            return (window.location !== window.parent.location);
        }

        let forgetPop = true;
        function onPopState(event) {
            if(forgetPop){
                forgetPop = false;
            } else if( pageInIframe()) {
                parent.postMessage(event.target.location.href, "app://obsidian.md");
            }
        }
        window.onpopstate = onPopState;
        window.onmessage = event => {
            if(event.data == "reload"){
                window.document.location.reload();
            }
            forgetPop = true;
        }

        function fitElements() {
            const itemsToFit = document.getElementsByClassName('fitText');
            for (const item in itemsToFit) {
                if (Object.hasOwnProperty.call(itemsToFit, item)) {
                    const element = itemsToFit[item];
                    fitElement(element, 1, 1000);
                    element.classList.remove('fitText');
                }
            }
        }

        function fitElement(element, start, end) {

            let size = (end + start) / 2;
            element.style.fontSize = `${size}px`;

            if (Math.abs(start - end) < 1) {
                while (element.scrollHeight > element.offsetHeight) {
                    size--;
                    element.style.fontSize = `${size}px`;
                }
                return;
            }

            if (element.scrollHeight > element.offsetHeight) {
                fitElement(element, start, size);
            } else {
                fitElement(element, size, end);
            }
        }

        document.onreadystatechange = () => {
            fitElements();
            if (document.readyState === 'complete') {
                if (pageInIframe() && window.location.href.indexOf("?export") != -1){
                    parent.postMessage(event.target.location.href, "app://obsidian.md");
                }
                if (window.location.href.indexOf("print-pdf") != -1){
                    let stateCheck = setInterval(() => {
                        clearInterval(stateCheck);
                        window.print();
                    }, 250);
                }
            }
        };
    </script>

<li><h2 id="wie-bin-ich-zum-seminargegenstand-gekommen">Wie bin ich zum Seminargegenstand gekommen?</h2>
<ul>
<li><strong>Ausgang von Leseszenen</strong>: Lesende ahmen Gelesenes nach (Don Quijote, Madame Bovary, …) – allgemeineres Beispiel: Erfindung der „romantischen Liebe” durch die Literatur</li>
<li>mimetisches Verhältnis? Ansteckung? → Mimesis als grundlegender Begriff der Literaturwissenschaft – <strong>Beispiel Weegee</strong></li>
<li>Begriff Meme bezieht sich auch auf diese Formen der Nachahmung</li>
<li>zugleich: <strong>memetischer Aspekt von Kunst</strong> – gerade postmoderne Kunst steht häufig in komplexen Nachahmungs- und Zitatverhältnissen zu Vorgängern, Adaptionen, Remakes, Prequels, etc. – Intertextualität – explizite Beispiele aus Dada und Surrealismus unterstreichen das (Magritte)</li>
<li><strong>Magritte</strong>: <ul>
<li>eine Art Image-Macro?</li>
<li>Reflexion auf Verhältnis Wirklichkeit/Abbildung – mimetischer Realismus?</li>
<li>Variationen und Adaptionen falten diese Reflexion weiter aus</li>
<li>Genre: Meta-Memes – Idee: anhand von Memes lässt sich Grundsätzliches über Mimesis (Verhältnis Wirklichkeit/Abbildung, Werke/Rezeption) lernen</li>

# Informationen zum Kurs
- **Studienleistung**: mündliches Referat von ca. 10 Minuten (vgl. allgemeines Hinweisblatt bei Teams). Je nach Erfahrung und Interesse sind unterschiedliche Formen möglich:
	1. Referat zum Sitzungstext: Einführende Infos, eingehende Diskussion ausgewählter Passagen, Verknüpfung mit eigenen Ideen/Beispielen, Diskussionsfragen.
	2. Veranschaulichung von Aspekten des Sitzungsthemas oder -textes anhand von selbstgewählten Beispielen aus der digitalen Bildkultur
	3. Referat zu ergänzenden Themen: Kurzdarstellung von Begriffen oder Beispielen, die in Bezug zum Sitzungsthema stehen, aber vom Sitzungstext nicht behandelt werden.
- Alle **Seminarmaterialien** finden Sie im Teams-Ordner der Übung: 
	- Hinweisblätter zur Vorbereitung der nächsten Sitzung (spätestens eine Woche vor der jeweiligen Sitzung). 
	- Sitzungstexte und weiterführende Literatur
	- laufende Sammlung von Memes mit Bezug zu Sitzungsthemen
- Bitte melden Sie sich rechtzeitig bei mir per email (joachim.harst@uni-saarland.de), wenn die Seminarmaterialien einmal nicht zugänglich sein sollten!!
<!-- end::[PS Memes und Mimesis – Seminarplan.md] -->

    <script>
        function extend() {
            const target = {};
            for (let i = 0; i < arguments.length; i++) {
                const source = arguments[i];
                for (const key in source) {
                    if (source.hasOwnProperty(key)) {
                        target[key] = source[key];
                    }
                }
            }
            return target;
        }

        function isLight(color) {
            let hex = color.replace('#', '');

            // convert #fff => #ffffff
            if (hex.length == 3) {
                hex = `${hex[0]}${hex[0]}${hex[1]}${hex[1]}${hex[2]}${hex[2]}`;
            }

            const c_r = parseInt(hex.substr(0, 2), 16);
            const c_g = parseInt(hex.substr(2, 2), 16);
            const c_b = parseInt(hex.substr(4, 2), 16);
            const brightness = ((c_r * 299) + (c_g * 587) + (c_b * 114)) / 1000;
            return brightness > 155;
        }

        const bgColor = getComputedStyle(document.documentElement).getPropertyValue('--r-background-color').trim();

        if (isLight(bgColor)) {
