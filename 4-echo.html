            } else {

<aside class="notes"><h2 id="velazquez">Velazquez</h2>
<p>In <em>Las Hilanderas</em>, Velázquez developed a layered composition, an approach he had often used in his earlier bodegones, such as the <em><a href="https://en.wikipedia.org/wiki/Kitchen_Scene_with_Christ_in_the_House_of_Martha_and_Mary_(Vel%C3%A1zquez)" title="Kitchen Scene with Christ in the House of Martha and Mary (Velázquez)">Kitchen Scene with Christ in the House of Martha and Mary</a></em>. In the foreground is the contest. The goddess Athena, disguised as an old woman, is on the left and Arachne, in a white top facing away from the viewer, is on the right. Three helpers assist them. In the background, a raised platform (perhaps a stage) displays the finished tapestries. The one visible to us is Arachne&#39;s, showing <a href="https://en.wikipedia.org/wiki/Titian" title="Titian">Titian</a>&#39;s <em><a href="https://en.wikipedia.org/wiki/The_Rape_of_Europa_(Titian)" title="The Rape of Europa (Titian)">The Rape of Europa</a></em> — another Greek myth. This is in fact a copy of Titian&#39;s painting of the subject, which was in the Spanish royal collection.</p>
<p>The painting has been interpreted as an allegory of the arts and even as a commentary on the range of creative endeavor, with the fine arts represented by the goddess and the crafts represented by Arachne. Others think that Velázquez&#39; message was simply that to create great works of art, both great creativity and hard technical work are required. Other scholars have read political allegories into the work and interpreted it through popular culture.</p>

<aside class="notes"><h2 id="ovid-struktur-buch-10">Ovid: Struktur Buch 10</h2>
<blockquote>
<p>[!note] Verschachtelung der Geschichten diagrammatisch darstellen</p>
</blockquote>
<ul>
<li><strong>Rahmengeschichte: Orpheus</strong>: Sänger und Seher (poeta vates), Nachfolger des Apollo (Leier), aber auch mit Dionysos verbunden (historisch als Reformer: orphische Mysterien, mythisch durch seinen Tod) <strong>= Spannung zwischen ordnender Gestaltung und rauschhaftem Enthusiasmus</strong> – sein Gesang bewegt Steine und Unterweltsgötter (vs. sonstige Verwandlungen in Stein) – Orpheus und Euridike (eheliche Liebe/Treue, Wiederkehr von den Toten/zweifacher Tod; danach Enthaltsamkeit, Abweisung von ‚sündhaften’ Frauen, Knabenliebe)<ul>
<li><strong>Gesänge des Orpheus</strong> (Binnengeschichten) – Thema: „Knaben, die von Göttern geliebt wurden, und Mädchen, die von verbotener Leidenschaft ergriffen wurden” (trifft nicht exakt zu)</li>
<li>Katalog der Bäume (von Orpheus bewegt)</li>
<li><strong>Ganymed</strong>: Geliebter des Zeus (Knabenliebe)</li>
<li>Hyacinthus: endet mit Verwandlung in Blume – Zusammenhang mit spartanischem Ritus (Hyacinthien)</li>
<li><strong>Pygmalion</strong>: von Ovid zum Künstler gemacht (zuvor König, s. @Martin-2019a) – Reflexionsfigur zu Orpheus (Rolle von Kunst, Verlebendigung toter Materie) – weist ‚sündhafte’ Frauen ab – Faszination mit Kunstwerk/Statue (vgl. Narziss!) – „so vollkommen verbirgt sich im Kunstwerk die Kunst” – Feiertag Venus, Opfer, Gebet, Venus gewährt Wunsch – das Mädchen als lebendiges „Wunschbild” (→ narzisstisch? Inzest?) – Mädchen bleibt namenlos </li>
<li>Myrrha (Enkelin des P.): sehr ausführliche Inzest-Geschichte mit Vater Cinyras – wird in einen Baum verwandelt – ihr Sohn Adonis wird gerettet</li>
<li><strong>Adonis und Venus</strong>: <ul>
<li>Venus erzählt: <em>Atalanta und Hippomenes</em> – Venus greift zugunsten von Hippomenes ein, wird von ihm verschmäht, bestraft ihn</li>
</ul>
</li>
<li>Adonis’ Schicksal: trotz Warnung stirbt er bei der Jagd – Verwandlung in Anemone</li>
</ul>
</li>
<li>zurück zu Orpheus: sein Tod (von Mänaden zerrissen: O. verschmäht sie und ihren Kult) – Zerstreuung seiner Glieder – sein Mund singt weiter, der Gesang kann ihn nicht retten – Einkehr in die Unterwelt – Zorn des Dionysos</li>
</ul>

## Rezeption in der Neuzeit
- Pygmalion als Künstlerphilosoph und zentrale Reflexionsfigur (Rousseau)
- Pygmalion als Inbegriff des schöpferischen Künstlers (und teils Rezipienten)
- Pygmalion als Spannungsfigur zwischen Schöpfer und Geschöpf (Paragone).
## Rezeption in der Moderne
- „Mythenkorrekturen” (Versteinerung, Geschlechtertausch)
- Analogisierung von Pygmalion und Frankenstein (R. Powers)

<p class="source">Martin, D. (2019). Art. Pygmalion. In M. Moog-Grünewald (Hrsg.), Mythenrezeption: Die antike Mythologie in Literatur, Musik und Kunst von den Anfängen bis zur Gegenwart (pp. 366–375). Brill.</p>
