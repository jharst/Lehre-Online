        function pageInIframe() {

        function onPopState(event) {
            if(forgetPop){
                forgetPop = false;
            } else if( pageInIframe()) {

        function fitElements() {
            const itemsToFit = document.getElementsByClassName('fitText');
            for (const item in itemsToFit) {
                if (Object.hasOwnProperty.call(itemsToFit, item)) {
                    const element = itemsToFit[item];
                    fitElement(element, 1, 1000);
                    element.classList.remove('fitText');
                }
            }
        }

        function fitElement(element, start, end) {

            let size = (end + start) / 2;
            element.style.fontSize = `${size}px`;

            if (Math.abs(start - end) < 1) {
                while (element.scrollHeight > element.offsetHeight) {
                    size--;
                    element.style.fontSize = `${size}px`;
                }
                return;
            }

            if (element.scrollHeight > element.offsetHeight) {
                fitElement(element, start, size);
            } else {
                fitElement(element, size, end);
            }
        }

        document.onreadystatechange = () => {
            fitElements();
            if (document.readyState === 'complete') {
                if (pageInIframe() && window.location.href.indexOf("?export") != -1){
                    parent.postMessage(event.target.location.href, "app://obsidian.md");
                }
                if (window.location.href.indexOf("print-pdf") != -1){
                    let stateCheck = setInterval(() => {
                        clearInterval(stateCheck);
                        window.print();
                    }, 250);

<aside class="notes"><ul>
<li><h2 id="gegenüberstellung-platon--aristoteles">Gegenüberstellung Platon – Aristoteles</h2>
<ul>
<li><h2 id="form">Form</h2>
</li>
<li>Dialog vs. Vorlesung</li>
<li>„Maieutik” vs. dozierende Lehre (analytisch)</li>
<li>Kontext: Staatslehre (gesellschaftliche Ordnung, gerechte Herrschaft, Wächter) vs. Analyse der Kunstgattungen</li>
<li>These: Nachahmung wirkt negativ auf die Seele vs. Nachahmung macht Freude und erlaubt Erkenntnis</li>
<li><h2 id="mimesis-begriff">Mimesis-Begriff</h2>
</li>
<li><h4 id="platon">Platon:</h4>
<ul>
<li>Diegesis (Erzählung, Lyrik: ein Erzähler spricht, ohne sich zu „verstellen”) vs. Mimesis (Nachahmung, dramatischer Dialog)</li>
<li><strong>Kritikpunkte Buch III</strong>: „Ansteckung” durch Nachahmung (219), Vielfalt der Nachahmung widerspricht „Professionalität” (man kann immer nur in <em>einer</em> Sache gut sein), daher ist der vielfach begabte Dichter nur als Gast in der Stadt erlaubt</li>
<li><strong>Kritikpunkte Buch X:</strong> <ul>
<li>Ideen- und Abbildlehre; Abbilder sind Schein, nicht Wahrheit; Malerei ahmt äußere Erscheinung nach, nicht die Idee; Nachahmung ist daher von der Wahrheit zweifach entfernt; Wissen entsteht aber im Gebrauch, nicht in der Nachahmung oder Herstellung (825)</li>
<li>Seelenlehre: Ratio (Innerlichkeit, innere Ruhe) und Affekt (Körperlichkeit); Nachahmung bezieht sich auf Äußerliches und spricht den Affekt an; der Genuss der Nachahmung wirkt auf die Seele zurück</li>
</ul>
</li>
</ul>
</li>
<li><h4 id="aristoteles">Aristoteles:</h4>
<ul>
<li>Mimesis Oberbegriff, zu differenzieren nach Mittel, Gegenstand und Modus (Bericht oder Handlung)</li>
<li>Ursachen der Dichtung: natürliche, angeborene menschliche Fähigkeit, Lernen durch mimetische Darstellung anderer → Zitat (6)</li>
</ul>
</li>
<li>Schluss: Platons Dialoge als Beispiel für Mimesis!<!-- .slide: class="has-light-background" data-background-color="lightgrey" --></li>
</ul>
</li>
</ul>

    <script>
        function extend() {
            const target = {};
            for (let i = 0; i < arguments.length; i++) {
                const source = arguments[i];
                for (const key in source) {
                    if (source.hasOwnProperty(key)) {
                        target[key] = source[key];
                    }
                }
            }
            return target;
        }

        function isLight(color) {
            // normalize to rgb(a)
            const optionEl = document.createElement("option");
            optionEl.style.color = color;
            const normalizedColor = optionEl.style.color;

            const [_, c_r, c_g, c_b] = normalizedColor.match(/(\d+), (\d+), (\d+)/);

            const brightness = ((c_r * 299) + (c_g * 587) + (c_b * 114)) / 1000;
            return brightness > 155;
        }

        const bgColor = getComputedStyle(document.documentElement).getPropertyValue('--r-background-color').trim();

        if (isLight(bgColor)) {
            document.body.classList.add('has-light-background');
        } else {
            document.body.classList.add('has-dark-background');
        }

        // default options to init reveal.js
        const defaultOptions = {
            controls: true,
            progress: true,
            history: true,
            center: true,
            transition: 'default', // none/fade/slide/convex/concave/zoom
            plugins: [
                ObsidianMarkdown,
                RevealHighlight,
                RevealZoom,
                RevealNotes,
                RevealMath.KaTeX,
                RevealMermaid,
                RevealChart,
                RevealCustomControls,
                RevealMenu,
            ],
            allottedTime: "120",

            katex: {
                local: 'plugin/math/katex',
                extensions: ["mhchem"],
            },
            markdown: {
                gfm: true,
            },
            mermaid: {
                theme: isLight(bgColor) ? 'default' : 'dark',
            },
            customcontrols: {
                controls: [
                ]
            },
            menu: {
                loadIcons: false
            },
        };

        if ( pageInIframe() ) {
            defaultOptions.scrollActivationWidth = 5;
        }

        // options from URL query string
        const queryOptions = Reveal().getQueryHash() || {};

        const options = extend(defaultOptions, {"controls":true,"progress":true,"slideNumber":true,"center":false,"transition":"slide","transitionSpeed":"default","width":1920,"height":1080,"margin":0.04}, queryOptions);
    </script>

    <script>
      /**
       * KaTeX Equation Numbering Note
       * 
       * KaTeX maintains a global equation counter for \begin{equation} environments.
       * When navigating between slides, reveal.js math plugin may re-render math, causing 
       * equation numbers to change randomly.
       * 
       * Note: Regular $$ blocks don't have equation numbers - only \begin{equation} does.
       * 
       * If you experience issues with equation numbers changing:
       * Use manual \tag{} commands: \begin{equation}\tag{1} ... \end{equation}
       */
      
      Reveal.initialize(options);
    </script>
