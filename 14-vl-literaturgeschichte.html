        function pageInIframe() {

            if(forgetPop){
                forgetPop = false;

            forgetPop = true;
        }

        function fitElements() {
            const itemsToFit = document.getElementsByClassName('fitText');
            for (const item in itemsToFit) {
                if (Object.hasOwnProperty.call(itemsToFit, item)) {
                    const element = itemsToFit[item];
                    fitElement(element, 1, 1000);
                    element.classList.remove('fitText');
                }
            }
        }

        function fitElement(element, start, end) {

            let size = (end + start) / 2;
            element.style.fontSize = `${size}px`;

            if (Math.abs(start - end) < 1) {
                while (element.scrollHeight > element.offsetHeight) {
                    size--;
                    element.style.fontSize = `${size}px`;
                }
                return;
            }

            if (element.scrollHeight > element.offsetHeight) {
                fitElement(element, start, size);
            } else {
                fitElement(element, size, end);
            }
        }

        document.onreadystatechange = () => {
            fitElements();
            if (document.readyState === 'complete') {
                if (pageInIframe() && window.location.href.indexOf("?export") != -1){
                    parent.postMessage(event.target.location.href, "app://obsidian.md");
                }
                if (window.location.href.indexOf("print-pdf") != -1){
                    let stateCheck = setInterval(() => {
                        clearInterval(stateCheck);
                        window.print();
                    }, 250);
                }
            }
        };

René Magritte: La trahison des images (1929), 60 x 81 cm, Öl auf Leinwand, Los Angeles County Museum of Art.<!-- .element: style="font-size: smaller; transform: rotate(270deg); position: absolute; left: 73%; top: 40%; height: 20%; width: 50%; display: flex; flex-direction: column; align-items: start; justify-content: center" -->

<aside class="notes"><h2 id="zu-magritte">Zu Magritte:</h2>
<ul>
<li>das Bild thematisiert die Kluft zwischen Objekt, bildlicher Repräsentation und sprachlicher Bezeichnung, obwohl es zugleich in „realistischer” oder illusionistischer Weise gemalt ist</li>
<li>Magritte malt eine Pfeife, aber damit schafft er eben nur ein Abbild und nicht die Pfeife selber, ein Widerspruch, der durch die Bildunterschrift verdoppelt wird, da auch die Repräsentation der Pfeife als sprachliches Zeichen nicht ihre Präsenz, sondern genau genommen immer nur ihre Absenz markiert. Wo ein Abbild einer Pfeife ist, als bildliches oder als sprachliches Zeichen, ist eben nie eine Pfeife. </li>
<li>Das wird durch die Vieldeutigkeit des deiktischen Artikels „ceci” noch verstärkt: Das Wort kann sich sowohl auf die bildliche als auf die sprachliche Repräsentation beziehen.</li>
<li>Überhaupt ist der Einbezug der Bildunterschrift in das Bild selbst wichtig (Bild und Legende werden zusammengezogen)</li>
<li>Übersetzungsbeziehung zwischen Bild und Sprache (wichtig für Szene bei Mulholland Drive)</div></li>
</ul>
</aside></script></section><section ><section data-markdown><script type="text/template"><!-- .slide: class="has-light-background drop" data-background-color="white" template="" -->

## Club Silencio: Word magic (~01:44:00)
<div id="poem"><p>
No hay banda</br>there is no band</br>il n’est pas de orchestra</br>it is all a tape recording</br></p>
<p>no hay banda</br>and yet we hear a band</br>if we want to hear a clarinet</br>– listen! –</br>un trombone a coulisse</br>un trombone con sordina (…) </p> 
<p>it’s all recorded</br>il n’est pas de orchestra</br>it is –– an illusion</p></div>

<aside class="notes"><h3 id="club-silencio--014045">Club Silencio – 01:40:45</h3>
<ul>
<li>Spiel mit sprachlicher Übersetzung – zwischen den Sprachen permutierenden Rede </li>
<li>Mit Bezug auf die aus den Kulissen ertönende Musik ruft der Zauberer aus: »No hay banda! – There is no band – Il n’est pas de orchestra – This is all a tape recording.« Die Mehrdeutigkeit des spanischen Wortes »banda« erlaubt, wie die Übersetzungen zeigen, eine widersprüchliche Auslegung: Die Behauptung »no hay banda«, es gebe keine Band, wird durch die aus ihr gezogene Konsequenz – die Musik aus den Kulissen kommt vom Band – widerlegt; und dieser Widerspruch wird wenig später auch direkt ausgesprochen: »No hay banda – and yet we hear a band.« Und darauf: »No hay banda – It is all a tape.« Gerade die Abwesenheit der Band belegt also, dass es ein Band – eben die Musik- und Filmaufzeichnung – gibt; das bedeutet aber auch, dass diese Feststellung nicht eine vorgebliche Realität (des Orchesters, des Films) als Illusion entlarvt, sondern umgekehrt die abgeklärte, realistische Feststellung (»no hay banda«) als innerlichen Widerspruch kenntlich macht. Mit diesem magischen Wortspiel, das der desillusionierenden Negation ihr spiegelverkehrtes Gegenteil entlockt, verliert die ﬁktionale Welt von Mulholland Dr. ihre Grenze, wird auch die Behauptung einer enttäuschten Realität von Fiktion durchsetzt. In diesem Sinn spricht der Magier die gewichtigen Worte »it is – an illusion« und verschwindet in einer grellblauen Rauchwolke.</div></li>
</ul>
</aside></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="has-light-background drop" data-background-color="lightgrey" -->

- der selbst gewählte Text wird sicher vorgestellt, in der literarischen Epoche kontextualisiert und in Bezug auf den jeweiligen Liebesdiskurs analysiert
- es werden in diesem Zusammenhang die folgenden Fragen beantwortet:
	- was zeichnet den Text aus?
	- inwiefern ist er exemplarisch für seine Epoche und Liebesdiskurs?
	- wie wird das Verhältnis Lesen/Lieben/Leben im Text dargestellt?
- abschließend: welche Parallel- und Kontrasttexte sind nennenswert? 

## Weiterer Prüfungsverlauf
- sichere Beherrschung der Werke in ihrem Bezug zum Vorlesungsthema und zur jeweiligen Epoche
- Kenntnis intertextueller Beziehungen (Motive, Zitate)
- Fähigkeit, Parallelen und Kontraste zu anderen Werken herzustellen (selbständig oder auf Nachfrage)
- sicherer Bezug auf übergeordnete Konzepte (Epochen, Gattungen, Lese- und Schreibpraktiken)

            const target = {};

        function isLight(color) {
            let hex = color.replace('#', '');

            // convert #fff => #ffffff
            if (hex.length == 3) {
                hex = `${hex[0]}${hex[0]}${hex[1]}${hex[1]}${hex[2]}${hex[2]}`;
            }

            const c_r = parseInt(hex.substr(0, 2), 16);

            const c_b = parseInt(hex.substr(4, 2), 16);
            const brightness = ((c_r * 299) + (c_g * 587) + (c_b * 114)) / 1000;
            return brightness > 155;
