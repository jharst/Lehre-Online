    <script type="text/javascript">
        function pageInIframe() {
            return (window.location !== window.parent.location);
        }

        let forgetPop = true;
        function onPopState(event) {
            if(forgetPop){
                forgetPop = false;
            } else if( pageInIframe()) {
                parent.postMessage(event.target.location.href, "app://obsidian.md");
            }
        }
        window.onpopstate = onPopState;
        window.onmessage = event => {
            if(event.data == "reload"){
                window.document.location.reload();
            }
            forgetPop = true;
        }

        function fitElements() {
            const itemsToFit = document.getElementsByClassName('fitText');
            for (const item in itemsToFit) {
                if (Object.hasOwnProperty.call(itemsToFit, item)) {
                    const element = itemsToFit[item];
                    fitElement(element, 1, 1000);
                    element.classList.remove('fitText');
                }
            }
        }

        function fitElement(element, start, end) {

            let size = (end + start) / 2;
            element.style.fontSize = `${size}px`;

            if (Math.abs(start - end) < 1) {
                while (element.scrollHeight > element.offsetHeight) {
                    size--;
                    element.style.fontSize = `${size}px`;
                }
                return;
            }

            if (element.scrollHeight > element.offsetHeight) {
                fitElement(element, start, size);
            } else {
                fitElement(element, size, end);
            }
        }

        document.onreadystatechange = () => {
            fitElements();
            if (document.readyState === 'complete') {
                if (pageInIframe() && window.location.href.indexOf("?export") != -1){
                    parent.postMessage(event.target.location.href, "app://obsidian.md");
                }
                if (window.location.href.indexOf("print-pdf") != -1){
                    let stateCheck = setInterval(() => {
                        clearInterval(stateCheck);
                        window.print();
                    }, 250);
                }
            }
        };

<li><h2 id="postmoderne-gumbrecht">Postmoderne (Gumbrecht)</h2>
<ul>
<li><h3 id="geschichtlich">geschichtlich</h3>
<ul>
<li>Ende der Moderne, Ende des geschichtlichen Bewusstseins</li>
<li>(Digitalisierung und Zeitlichkeit)</li>

<ul>
<li>Zitierbarkeit</li>
<li>(Ende der großen Narrative, Lyotard)</li>
<li>Nivellierung High/Low Kunst, Oberfläche/Tiefe, Sprache/Metasprache, Wirklichkeit/Fiktion</li>
<li>Verweis auf @Jameson-1984 (van Gogh vs. Warhol)<ul>
<li>„aesthetic production today has become integrated into commodity production generally” (56) – von Kunst kann keine kritische Distanz/Quasi-Autonomie mehr verlangt werden</li>

</li>
<li><a href="https://upload.wikimedia.org/wikipedia/commons/thumb/8/8e/Schoenen_-_s0011V1962_-_Van_Gogh_Museum.jpg/1920px-Schoenen_-_s0011V1962_-_Van_Gogh_Museum.jpg">Van Gogh|Van Gogh, Schuhe, Öl auf Leinwand, 1886. Van Gogh Museum, Amsterdam.</a></li>
<li><a href="https://www.artchive.com/wp-content/uploads/2024/08/Diamond-Dust-Shoes-Andy-Warhol-1980-.jpg">Andy Warhol, Diamond Dust Shoes, 1980. Siebdruck, Glaspulver.</a></li>
</ul>
</li>
</ul>
</li>
<li><h2 id="postmoderne-strategien-gude">Postmoderne Strategien (Gude)</h2>
<ul>
<li><p>kunstdidaktischer Ansatz – Entwicklung auf Basis von Arbeit mit Studierenden – Forderung, die 7 Elemente und Prinzipien der modernen Gestaltung durch Strategien zu ersetzen, die von den Studierenden selbst entwickelt wurden – Postulat, dass diese „postmodern” sind</p>
<ul>
<li>7 elements: Linie, Form, Farbe, Helligkeitswert, Textur, Gestalt, Raum</li>
<li>7 principles: Ausgewogenheit, Kontrast, Emphase, Bewegung, Rhythmus, Muster, Einheit/Vielfalt</li>
<li>postmodern principles (fusing visual forms and conceptual art making, = fusing principles and elements): appropriation, juxtaposition, recontextualization, hybridity, layering, text-image interaction, gazing, and representin’</li>
</ul>
</li>
<li><p>für mich wichtig: diese Strategien sind sich sehr ähnlich; sie haben alle mit den zuvor genannten Aspekten postmoderner Ästhetik (Zitierbarkeit, Nivellierung, Warencharakter) zu tun und lassen sich am besten als deren Ausdifferenzierung verstehen</p>
</li>
<li><p>ebenso wichtig: die meisten dieser Strategien haben „Vorläufer” in modernistischen und avantgardistischen Kunstformen (Dada, Surrealimus, 1920er Jahre) – es könnte sinnvoll sein, mit ein paar materiellen Beispielen (Collage, Frottage, …) zu beginnen, um den Zusammenhang zu verdeutlichen – Verweis auf „hot modernity” am Ende des Aufsatzes</p>
<ul>
<li><img src="https://cdn.thecollector.com/wp-content/uploads/2023/11/hannah-hoch-dada.jpg?width=1200&quality=100&dpr=2" alt="Untitled (Dada) by Hannah Höch, ca. 1922, via MoMA, New York" style="object-fit: scale-down">
</li>
<li><img src="https://cdn.thecollector.com/wp-content/uploads/2023/11/raoul-hausmann-art-critic-dada.jpg?width=968&quality=100&dpr=2" alt="The Art Critic by Raoul Hausmann, 1919-1920, via Tate, London" style="object-fit: scale-down">
</li>
<li><img src="https://www.moma.org/media/W1siZiIsIjE3OTMwOCJdLFsicCIsImNvbnZlcnQiLCItcXVhbGl0eSA5MCAtcmVzaXplIDIwMDB4MjAwMFx1MDAzZSJdXQ.jpg?sha=6f6cbb13b06bbbae" alt="Max Ernst. _The Fugitive_ (_L'Évadé_) from _Natural History_ (_Histoire Naturelle_). c. 1925, published 1926" style="object-fit: scale-down"></li>
</ul>
</li>
<li><p>Umgang mit Material</p>
<ul>
<li><em>appropriation</em>: recycling imagery and print materials – „If one lives in a forest, wood will likely become one&#39;s medium for creative play. If one grows up in a world filled with cheap, disposable images, they easily become the stuff of one&#39;s own creative expression.” (10)</li>
<li><em>Meme Beispiele</em>: You don’t say (Nick Cage in <em>Vampire Kiss</em> 1998), Renaissance Scumbag (ursprüngliches Gemälde von Botticelli)</li>
<li><em>juxtaposition</em>: (instead of contrast): bringing together radically disparate elements (ex. <a href="https://www.moma.org/media/W1siZiIsIjYxNDY5NyJdLFsicCIsImNvbnZlcnQiLCItcXVhbGl0eSA5MCAtcmVzaXplIDIwMDB4MjAwMFx1MDAzZSJdXQ.jpg?sha=203e557b7d43cc8e">M. Oppenheimer|Meret Oppenheim, Object. Paris, 1936</a>) – Analogie zu Schockerfahrung</li>
<li><em>Meme Beispiele</em>: Erschaffung Adams/Pepperspray Cop; Weegee/Hillary Clinton </li>
<li><em>recontextualisation and deconstruction</em>: recombining found imagery (ex. <a href="https://berliner-zeitung.imgix.net/2022/03/04/6830aceb-82f6-4ad6-8d66-d61cf53dd202.jpeg">Hannah Höch, Die Braut</a>, 1927; in diesem Fall wird das vorgefundene Material abgemalt) – weiterer Verweis: adbusters</li>
<li><em>Meme Beispiele</em>: Mona Lisa and Friends (recombining found imagery); Mona Lisa/The Shining (deconstruction) </li>
<li><em>layering</em>: Überfluss an Bildern/gestapelte Bilder, kreiert Tiefenstruktur und Komplexität –  ich muss hier als Beispiel an Gerhard Richter denken – Verweis auf digitale Bildproduktion (Photoshop)</li>
<li><em>interaction of text and image</em>: Bsp. <a href="https://www.moca.org/storage/app/uploads/public/5cd/312/d1c/5cd312d1cdaf2983717804.jpg">Barbara Kruger</a> – keine illustrative/explizierende Funktion</li>
<li><em>Meme Beispiele:</em> Scumbag Steve (einfach); You don’t say (cat, komplex)</li>
<li><em>hybridity</em>: hier bezogen auf verwendete Materialien/Medien und „cultural blending” - ex. Mariko Mori</li>
</ul>
</li>
<li><p>Identität und Politik</p>
<ul>
<li><em>gazing</em>: Thematisierung des Machtverhältnisses im Blick/Bild</li>
<li><em>representin’</em>: „locating one’s artistic voice within one’s own personal history and culture of origin”</li>
</ul>
</li>
</ul>
</li>
</ul>

- Zitierbarkeit (von Geschichte und Kunst)
- Nivellierung von High/Low Culture, Oberfläche/Tiefe, Sprache/Metasprache, Wirklichkeit/Fiktion
- Jameson: „aesthetic production today has become integrated into commodity production generally” (1984, S. 56)

<li>Zitierbarkeit: kein Original mehr ohne gleichzeitigen Verweis auf Vorbilder, Kontexte, Vorgänger; das Zitierte steht gleichwertig und ahistorisch nebeneinander<!-- .slide: class="has-light-background" data-background-color="lightgrey" --></li>

## Postmoderne Strategien
- Gude: kunstdidaktischer Ansatz, entwickelt aus der Arbeit mit Studierenden
- Forderung: Die 7 Elemente und Prinzipien der modernen Gestaltung ersetzen
	- **7 elements** (modern): Linie, Form, Farbe, Helligkeitswert, Textur, Gestalt, Raum
	- **7 principles** (modern): Ausgewogenheit, Kontrast, Emphase, Bewegung, Rhythmus, Muster, Einheit/Vielfalt
- **postmoderne Prinzipien** (Gude): Fusion von visuellen Formen und konzeptuellen Kunststrategien
<p class="source">Gude, O. (2004). Postmodern Principles: In Search of a 21st Century Art Education. <em>Art Education</em>, 57(1), 6–14.</p>


</div>
</div>

<aside class="notes"><ul>
<li>Gude kritisiert die 7+7-Liste als modernistisches Erbe ohne kritische Reflexion</li>
<li>Ihre Prinzipien sind empirisch aus Studierenden-Projekten abgeleitet, nicht top-down postuliert</li>
<li>Wichtig: diese Strategien ähneln sich sehr; sie alle haben mit Zitierbarkeit, Nivellierung und Warencharakter zu tun – sie sind als Ausdifferenzierung postmoderner Ästhetik zu verstehen</li>
<li>Wichtig: die meisten Strategien haben Vorläufer in der Avantgarde (Dada, Surrealismus, 1920er Jahre)</li>
</ul>

## Strategie 1: Appropriation

> „If one lives in a forest, wood will likely become one's medium for creative play. If one grows up in a world filled with cheap, disposable images, they easily become the stuff of one's own creative expression." — Gude (2004), S. 10

- Vorgefundenes (künstlerisches, alltägliches, mediales) Material als Rohstoff kultureller  Produktion
- Verwandt mit: Rekontextualisierung

## Strategie 2: Juxtaposition
- Zusammenbringen radikal disparater Elemente
- Analogie zur Schockerfahrungen moderner Wirklichkeit


</div>
</div>

<aside class="notes"><ul>
<li>Gude: Das modernistische Prinzip des Kontrasts ist nicht ausreichend, um die Energie zu beschreiben, die durch radikal disparate Elemente entsteht</li>
<li>Oppenheims pelzbedeckte Tasse: Alltagsgegenstand + fremdes Material = surrealer Schock</li>
<li>Juxtaposition ist strukturell: die Bedeutung liegt im Spalt zwischen den Elementen, nicht in den Elementen selbst</li>
<li>Lautréamont (Quelle für viele surrealistische Juxtapositionen): „schön wie die zufällige Begegnung einer Nähmaschine und eines Regenschirms auf einem Seziertisch&quot;</li>
</ul>
<!-- .slide: class="has-light-background" data-background-color="lightgrey" --></aside></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="has-light-background drop" template="" data-background-color="lightgrey" -->

## Strategie 3: Recontextualization & Deconstruction

- Bekannte Materialien in neuen Beziehungsrahmen setzen
- zirkulierende Medien
- Bsp: fotografisches Bildmaterial erhält durch Rekontextualisierung neue Aussagekraft
- Zusammenhang mit „Dekonstruktion”


</div>
</div>

<aside class="notes"><ul>
<li>Gude: Recontextualization = Platzierung eines vertrauten Bildes in ungewohntem Umfeld erzeugt neue Bedeutung</li>
<li>Dekonstruktion (Derrida): präziser Begriff, meint das Freilegen von Widersprüchen und Ausschlüssen in Texten und Systemen – im Kunstdiskurs aber oft vereinfacht verwendet</li>
<li><strong>Adbusters</strong>: Werbebilder werden durch minimale Eingriffe (hinzugefügter Text, veränderte Slogans) dekonstruiert – das System der Werbung wird mit seinen eigenen Mitteln untergraben</li>
<li><strong>zu Höch</strong>: In „Die Braut&quot; wird der Kinderkopf an Stelle des Frauenkopfes gesetzt</li>
<li>Die romantische Lesart des Brautpaares wird durch diese Recontextualization verschoben zur Kritik an gesellschaftlichen Konventionen (rechtliche, religiöse, kulturelle Normen bezüglich des Status der Frau)</li>
<li>Das vorgefundene Material (Zeitungsfotos, Illustrationen) wird hier teilweise abgemalt – eine Intensivierung der Recontextualization</li>
</ul>
<!-- .slide: class="has-light-background" data-background-color="lightgrey" --></aside></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="has-light-background drop" template="" data-background-color="lightgrey" -->

## Strategie 4: Layering

- Überfluss an Bildern → gestapelte Bilder
- Erzeugt Tiefenstruktur und Komplexität
- Analogie: Gerhard Richter (Übermalung)
- Digitale Bildproduktion: Photoshop als technische Entsprechung
</div>

<aside class="notes"><ul>
<li>Gude: Layering evoziert die Komplexität des Unbewussten (Surrealismus) und die Vielschichtigkeit zeitgenössischer Kulturproduktion</li>
<li>Gerhard Richter: Übermalungen als materielles Layering – das Vorherige ist noch spürbar, aber überschrieben; das Bild trägt seine eigene Geschichte in sich</li>
<li>Photoshop: Layering als Standardfunktion digitaler Bildbearbeitung – Transparenz, Überlagerung, Maskierung sind technisch trivial geworden</li>
<li>Meme-Entsprechung: Deep-Fried Memes (extreme Kompression und Sättigung als sichtbares Layering der Zirkulationsgeschichte eines Bildes)</li>
</ul>
</aside></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->

## Strategie 5: Interaction of Text & Image
- Text illustriert nicht das Bild; Bild illustriert nicht den Text
- Das Wechselspiel zwischen beiden erzeugt Bedeutung


</div>
</div>

<aside class="notes"><ul>
<li>Kruger: Text und Bild sind nicht illustrativ aufeinander bezogen, sondern erzeugen im Widerspruch zueinander Bedeutung</li>
<li>Das Prinzip ist für Meme-Analyse zentral: Bildunterschriften im Meme-Format sind fast nie rein deskriptiv, sondern immer bedeutungsverschiebend</li>
<li>Zwei Modi: (1) Text verstärkt das Bild (einfaches Verhältnis), (2) Text konterkariert das Bild (komplexes Verhältnis)<!-- .slide: class="has-light-background" data-background-color="lightgrey" --></li>
</ul>
</aside></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="has-light-background drop" template="" data-background-color="lightgrey" -->

<li>Einfaches Text-Bild-Verhältnis: die Beschriftung benennt, was das Bild zeigt; Text und Bild verstärken sich gegenseitig</li>

## Strategie 6: Hybridity

- Verwendung verschiedener Medien/Materialien in einem Werk
- „Cultural blending" als kulturelle Dimension
- Referenzbeispiel: Mariko Mori (Fotografie, Video, buddhistische Tradition, Cyberkultur)
</div>

<aside class="notes"><ul>
<li>Gude: Hybridity beschreibt sowohl die Medien-Hybridisierung (Skulptur + Video + Sound) als auch die kulturelle Hybridisierung (Traditionen verschiedener Kulturen in einem Werk)</li>
<li>Mariko Mori: Costuming, Make-up, Popkultur und buddhistischer Glaube werden in komplexen fotografischen und Video-Installationen zusammengeführt</li>
<li>Für Memes relevant: das Internet-Meme ist strukturell hybrid – es kombiniert Bild, Text, oft auch Sound und Animation; GIFs, Video-Memes und Reaction-Memes sind hybride Medienformen</li>
</ul>

## Strategie 8: Representin'

- „Locating one's artistic voice within one's own personal history and culture of origin" (Gude)
- Kunst als Selbstverortung in Geschichte und Gemeinschaft
- Beispiele: David Wojnarowicz, Tracey Emin, Shirin Neshat
</div>

<aside class="notes"><ul>
<li>Representin&#39; ist die Strategie, die am stärksten Identitätspolitik berührt</li>
<li>David Wojnarowicz: Kunst gegründet in Erfahrungen als junger schwuler Mann in New York während der AIDS-Krise</li>
<li>Tracey Emin: Biographische Mixed-Media-Werke, die alle Aspekte des eigenen Lebens thematisieren</li>
<li>Shirin Neshat: Videoinstallationen zu den psychologischen Bedingungen von Frauen in islamischen Gesellschaften</li>
<li>Für das Seminar: Meme-Kulturen wie Black Twitter oder indigene Meme-Traditionen als Formen von Representin&#39; – Selbstverortung durch das verfügbare Bildmaterial des Internets</li>
</ul>
</aside></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="has-light-background drop" template="" data-background-color="lightgrey" -->
<div class="" style="position: absolute; left: 0px; top: 0px; height: 1080px; width: 1920px; min-height: 1080px; display: flex; flex-direction: column; align-items: start; justify-content: center" absolute="true">

## Zusammenfassung: Postmoderne Strategien und Memes

|Strategie|Kernoperation|Meme-Beispiel|
|---|---|---|
|Appropriation|Bildrecycling|You Don't Say, Renaissance Scumbag|
|Juxtaposition|Disparate Elemente|Erschaffung Adams / Pepper Spray Cop|
|Recontextualization|Neuer Rahmen|Mona Lisa and Friends|
|Deconstruction|Systemkritik von innen|Mona Lisa / The Shining|
|Text-Image Interaction|Spannung Text/Bild|Scumbag Steve / You Don't Say (Cat)|
|Gazing|Blickkritik|–|
</div>

<aside class="notes"><ul>
<li>Diese Tabelle kann als Diskussionsgrundlage dienen</li>

    <script>
        function extend() {
            const target = {};
            for (let i = 0; i < arguments.length; i++) {
                const source = arguments[i];
                for (const key in source) {
                    if (source.hasOwnProperty(key)) {
                        target[key] = source[key];
                    }
                }
            }
            return target;
        }

        function isLight(color) {
            let hex = color.replace('#', '');

            // convert #fff => #ffffff
            if (hex.length == 3) {
                hex = `${hex[0]}${hex[0]}${hex[1]}${hex[1]}${hex[2]}${hex[2]}`;
            }

            const c_r = parseInt(hex.substr(0, 2), 16);
            const c_g = parseInt(hex.substr(2, 2), 16);
            const c_b = parseInt(hex.substr(4, 2), 16);
            const brightness = ((c_r * 299) + (c_g * 587) + (c_b * 114)) / 1000;
            return brightness > 155;
        }

        const bgColor = getComputedStyle(document.documentElement).getPropertyValue('--r-background-color').trim();

        if (isLight(bgColor)) {
            document.body.classList.add('has-light-background');
        } else {
            document.body.classList.add('has-dark-background');
        }

        // default options to init reveal.js
        const defaultOptions = {
            controls: true,
            progress: true,
            history: true,
            center: true,
            transition: 'default', // none/fade/slide/convex/concave/zoom

            },

            },

                theme: isLight(bgColor) ? 'default' : 'dark',
            },
            customcontrols: {

            },
            menu: {
                loadIcons: false
            }
        };

        if ( pageInIframe() ) {
            defaultOptions.scrollActivationWidth = 5;

        // options from URL query string
        const queryOptions = Reveal().getQueryHash() || {};

        const options = extend(defaultOptions, {"controls":true,"progress":true,"slideNumber":true,"center":false,"transition":"slide","transitionSpeed":"default","width":1920,"height":1080,"margin":0.04}, queryOptions);
