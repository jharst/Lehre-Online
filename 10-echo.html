    <script type="text/javascript">
        function pageInIframe() {
            return (window.location !== window.parent.location);
        }

        let forgetPop = true;
        function onPopState(event) {
            if(forgetPop){
                forgetPop = false;
            } else if( pageInIframe()) {
                parent.postMessage(event.target.location.href, "app://obsidian.md");
            }
        }
        window.onpopstate = onPopState;
        window.onmessage = event => {
            if(event.data == "reload"){
                window.document.location.reload();
            }
            forgetPop = true;
        }

        function fitElements() {
            const itemsToFit = document.getElementsByClassName('fitText');
            for (const item in itemsToFit) {
                if (Object.hasOwnProperty.call(itemsToFit, item)) {
                    const element = itemsToFit[item];
                    fitElement(element, 1, 1000);
                    element.classList.remove('fitText');
                }
            }
        }

        function fitElement(element, start, end) {

            let size = (end + start) / 2;
            element.style.fontSize = `${size}px`;

            if (Math.abs(start - end) < 1) {
                while (element.scrollHeight > element.offsetHeight) {
                    size--;
                    element.style.fontSize = `${size}px`;
                }
                return;
            }

            if (element.scrollHeight > element.offsetHeight) {
                fitElement(element, start, size);
            } else {
                fitElement(element, size, end);
            }
        }

        document.onreadystatechange = () => {
            fitElements();
            if (document.readyState === 'complete') {
                if (pageInIframe() && window.location.href.indexOf("?export") != -1){
                    parent.postMessage(event.target.location.href, "app://obsidian.md");
                }
                if (window.location.href.indexOf("print-pdf") != -1){
                    let stateCheck = setInterval(() => {
                        clearInterval(stateCheck);
                        window.print();
                    }, 250);
                }
            }
        };
    </script>

<li>Beitrag Rauch</li>
<li><h2 id="die-letzte-welt-als-postmoderner-roman"><em>Die letzte Welt</em> als postmoderner Roman</h2>
<ul>
<li>Darstellung des augusteischen Imperiums im Verhältnis zum Dichter – bewusste Anachronismen, Zitate historischer Wirklichkeit – technischer Stand, insbes. der Medien – Fiktionalität (Metamorphosen wurden nicht verbrannt) → der Roman als fiktionale Geschichtsschreibung – Ausgangsthese: Ovids <em>Metamorphosen</em> als oppositionelles Werk (Verwandlungen vs. ‚ewiges’ augusteisches Regime)</li>
<li>Verschwimmen von Wirklichkeit und Fiktion: in Tomi, an der Peripherie des Reiches, werden die Geschichten aus den <em>Metamorphosen</em> Wirklichkeit – Cotta begegnet lauter mythischen Gestalten (bzw. Figuren mit dem Namen mythischer Gestalten) und bezeugt deren Verwandlungen. – ein Beispiel: Echo</li>
</ul>
</li>
<li><h2 id="die-rolle-echos-als-zentrale-poetologische-figur">Die Rolle Echos als zentrale poetologische Figur</h2>
<ul>
<li>Charakterisierung, Randposition im Sozialgefüge der Stadt, Passivität</li>
<li>gibt die Erzählungen Ovids wieder</li>
<li>Verhältnis zu Cotta – was will Cotta von ihr? – die Vergewaltigung, die Beziehung danach</li>
</ul>
</li>
<li><h2 id="kapitel-7">Kapitel 7</h2>
<ul>
<li>Echos Erzählung von einem <em>Buch der Steine</em> – Deucalion und Pyrrha – die Geschichte von der Sintflut und einem letzten, steinernen Menschengeschlecht scheint in Tomi Wirklichkeit zu werden – ebenso wird Echo ihrem Namen gerecht</li>
<li>vielleicht wichtig: bei Ovid steht die Sintflut am Anfang seiner Geschichte (wie in der Bibel), bei Ransmayr ist sie als Ende der Geschichte gedacht – Gegensatz zwischen steinerner Ewigkeit und organischer Vergänglichkeit – die steinernen Menschen sollen keine Liebe kennen</li>
</ul>
</li>

        function extend() {
            const target = {};
            for (let i = 0; i < arguments.length; i++) {
                const source = arguments[i];
                for (const key in source) {
                    if (source.hasOwnProperty(key)) {
                        target[key] = source[key];
                    }
                }
            }
            return target;
        }

        function isLight(color) {
            // normalize to rgb(a)
            const optionEl = document.createElement("option");
            optionEl.style.color = color;
            const normalizedColor = optionEl.style.color;

            const match = normalizedColor.match(/(\d+), (\d+), (\d+)/);
            if (!match) return false;
            const [, c_r, c_g, c_b] = match;

            const brightness = ((c_r * 299) + (c_g * 587) + (c_b * 114)) / 1000;
            return brightness > 155;
        }

        const bgColor = getComputedStyle(document.documentElement).getPropertyValue('--r-background-color').trim();
