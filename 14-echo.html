        function pageInIframe() {
            return (window.location !== window.parent.location);
        }

        let forgetPop = true;
        function onPopState(event) {
            if(forgetPop){
                forgetPop = false;
            } else if( pageInIframe()) {
                parent.postMessage(event.target.location.href, "app://obsidian.md");
            }

        window.onpopstate = onPopState;
        window.onmessage = event => {
            if(event.data == "reload"){

            }
            forgetPop = true;
        }

        function fitElements() {
            const itemsToFit = document.getElementsByClassName('fitText');
            for (const item in itemsToFit) {
                if (Object.hasOwnProperty.call(itemsToFit, item)) {
                    const element = itemsToFit[item];
                    fitElement(element, 1, 1000);
                    element.classList.remove('fitText');
                }
            }
        }

        function fitElement(element, start, end) {

            let size = (end + start) / 2;
            element.style.fontSize = `${size}px`;

            if (Math.abs(start - end) < 1) {
                while (element.scrollHeight > element.offsetHeight) {
                    size--;
                    element.style.fontSize = `${size}px`;
                }
                return;
            }

            if (element.scrollHeight > element.offsetHeight) {
                fitElement(element, start, size);
            } else {
                fitElement(element, size, end);
            }
        }

        document.onreadystatechange = () => {
            fitElements();
            if (document.readyState === 'complete') {
                if (pageInIframe() && window.location.href.indexOf("?export") != -1){
                    parent.postMessage(event.target.location.href, "app://obsidian.md");
                }
                if (window.location.href.indexOf("print-pdf") != -1){
                    let stateCheck = setInterval(() => {
                        clearInterval(stateCheck);
                        window.print();
                    }, 250);
                }
            }
        };

## Viola: Bild-Verarbeitung

<!-- begin::[@Viola-2003.md] -->
- ["] We are living databases of images—collectors of images—and these images do not stop transforming and growing once they get inside us. The act of perception is, for me, only the first step in the art experience. \[…\] As you know, the term aesthetics comes from the ancient Greek and has to do with sense perception, particularly the visual, as it relates to pleasure, beauty, and taste. It’s the point when you raise your fork and you take a bite of the food—you taste it. But this is really only the beginning. Much more important is what happens when the food goes into your body, where it is digested and assimilated as energy. \[…\] Nutrition ultimately becomes the most important thing about images, not the taste. (210)
<!-- end::[@Viola-2003.md] -->

<p class="source">Viola, B. and Belting, H. (2003). A Conversation. In <em>The passions</em>. Ed. by. J. Walsh. Getty.</p>

## Narziss und die Malerei



<div class="block">

„Quae cum ita sint, consuevi inter familiares dicere picturae inventorem fuisse, poetarum sententia, Narcissum illum qui sit in florem versus, nam cum sit omnium artium flos pictura, tum de Narcisso omnis fabula pulchre ad rem ipsam perapta erit. **Quid est enim aliud pingere quam arte superficiem illam fontis amplecti?**”

„Weil dem so ist, pflege ich nach einer Redeweise der Dichter zu meinen Freunden zu sagen, jener Narziss, der in eine Blume verwandelt wurde, sei der Erfinder der Malerei gewesen. Da die Malerei zum einen die Blume aller Künste ist, passt die Erzählung von Narziß auch sonst gut zur Sache. **Was nämlich ist das Malen anderes, als durch die Kunst jene Oberfläche der Quelle zu umarmen?**”

Text: L.B. Alberti, De pictura (1436), 2,26. Bild: Caravaggio: Narziss (1597–1599). Öl auf Leinwand. Galleria Nazionale d’Arte Antica, Rom
</div>

## Ovid: Narziss
- ["] Wie oft tauchte er, um den Hals, den er sah, zu erhaschen, die Arme mitten ins Wasser und konnte sich nicht darin ergreifen! (430) Er weiß nicht, was er sieht; doch was er sieht, setzt ihn in Flammen. Und seine Augen reizt dasselbe Trugbild, das sie täuscht. Leichtgläubiger! Was greifst du vergeblich nach dem flüchtigen Bild! Was du erstrebst, ist nirgends; was du liebst, wirst du verlieren, sobald du dich abwendest. Was du siehst, ist nur Schatten, nur Spiegelbild. (435)
- ["] Sprach’s und kehrte in rasender Leidenschaft zu demselben Spiegelbild zurück, (475) trübte das Wasser mit Tränen, und durch die Bewegung im See wurden die Umrisse unscharf. Als er sah, daß das Bild verschwand, schrie er: „Wohin fliehst du? Bleib und laß mich, du Grausamer, in meiner Liebe nicht allein!”
<p class="source">Ovid. (2004). Metamorphosen (G. Fink, Ed. & Trans.). Artemis \& Winkler.</p>

- Vervielfachung der narzisstischen Situation
- Interpretation des Bewegungsablaufs
	1. „Umarmung” des Spiegelbilds
	2. Einswerden von Gesicht und Spiegelmedium (Wasser und Tränen, verzerrte Gesichtszüge)
	3. Enthüllung des Bilds als vervielfachtes Abbild
	4. Endlosschleife
