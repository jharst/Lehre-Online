        function pageInIframe() {
            return (window.location !== window.parent.location);
        }

        let forgetPop = true;
        function onPopState(event) {
            if(forgetPop){
                forgetPop = false;
            } else if( pageInIframe()) {
                parent.postMessage(event.target.location.href, "app://obsidian.md");
            }
        }
        window.onpopstate = onPopState;
        window.onmessage = event => {
            if(event.data == "reload"){
                window.document.location.reload();
            }
            forgetPop = true;
        }

        function fitElements() {
            const itemsToFit = document.getElementsByClassName('fitText');
            for (const item in itemsToFit) {
                if (Object.hasOwnProperty.call(itemsToFit, item)) {
                    const element = itemsToFit[item];
                    fitElement(element, 1, 1000);
                    element.classList.remove('fitText');
                }
            }
        }

        function fitElement(element, start, end) {

            let size = (end + start) / 2;
            element.style.fontSize = `${size}px`;

            if (Math.abs(start - end) < 1) {
                while (element.scrollHeight > element.offsetHeight) {
                    size--;
                    element.style.fontSize = `${size}px`;
                }
                return;
            }

            if (element.scrollHeight > element.offsetHeight) {
                fitElement(element, start, size);
            } else {
                fitElement(element, size, end);
            }
        }

        document.onreadystatechange = () => {
            fitElements();
            if (document.readyState === 'complete') {
                if (pageInIframe() && window.location.href.indexOf("?export") != -1){
                    parent.postMessage(event.target.location.href, "app://obsidian.md");
                }
                if (window.location.href.indexOf("print-pdf") != -1){
                    let stateCheck = setInterval(() => {
                        clearInterval(stateCheck);
                        window.print();
                    }, 250);
                }
            }
        };

## Stalder: Kultur der Digitalität (2016)
- &shy;<!-- .element: class="fragment" data-fragment-index="1" -->Kultur als soziale Praxis, nicht als Produkt
- &shy;<!-- .element: class="fragment" data-fragment-index="2" -->Digitalität: „Set von Relationen”, Materialität, Verknüpfung von menschlichen und nichtmenschlichen Akteuren
- &shy;<!-- .element: class="fragment" data-fragment-index="3" -->„Kultur der Digitalität” löst „Gutenberg-Galaxis” (McLuhan) ab

<p class="source">Stalder, F. (2016). Kultur der Digitalität. Suhrkamp. Einleitung. | McLuhan, M. (1962). The Gutenberg Galaxy: The Making of Typographic Man. University of Toronto Press.</p>


</div>

## Referentialität
- &shy;<!-- .element: class="fragment" data-fragment-index="1" -->modernistische Montage vs. postmoderne Referentialität (98)
- &shy;<!-- .element: class="fragment" data-fragment-index="2" -->basale Operationen: Auswählen und Ordnen (117f.)
- &shy;<!-- .element: class="fragment" data-fragment-index="3" -->Ausweitung der „Kulturschaffenden”
- &shy;<!-- .element: class="fragment" data-fragment-index="4" -->„Schlaufe durch den Körper” (Aufmerksamkeit, Lebenszeit, 118ff.)

<p class="source">Stalder, F. (2016). <em>Kultur der Digitalität.</em> Suhrkamp. Kap. 2.1.</p>

</div>
</div>

<aside class="notes"><ul>
<li>postmoderne Referentialität: synthetisierender Akt, der verschiedene Quellen zu einem neuen und ephemeren Ganzen zusammenführt (Beispiel Conchita Wurst!); „Schaffung von Authentizität”; moderne Montage stelle dagegen die Bruchlinien heraus (Beispiel: <em>Berlin Alexanderplatz</em>)</li>
<li>Auswählen und Ordnen als basale Operation der „Kulturschaffenden”: gilt auch für die Facebook-Seite, Statusupdates, Teilen/Posten von Fotos, Gestaltung der Foto-Sammlung etc. <!-- .slide: class="has-light-background" data-background-color="lightgrey" --></li>

        function extend() {
            const target = {};
            for (let i = 0; i < arguments.length; i++) {
                const source = arguments[i];
                for (const key in source) {
                    if (source.hasOwnProperty(key)) {
                        target[key] = source[key];
                    }
                }
            }
            return target;
        }

        function isLight(color) {
            // normalize to rgb(a)
            const optionEl = document.createElement("option");
            optionEl.style.color = color;
            const normalizedColor = optionEl.style.color;

            const [_, c_r, c_g, c_b] = normalizedColor.match(/(\d+), (\d+), (\d+)/);

            const brightness = ((c_r * 299) + (c_g * 587) + (c_b * 114)) / 1000;
            return brightness > 155;
        }

        const bgColor = getComputedStyle(document.documentElement).getPropertyValue('--r-background-color').trim();
