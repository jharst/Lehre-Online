            const itemsToFit = document.getElementsByClassName('fitText');
            for (const item in itemsToFit) {
                if (Object.hasOwnProperty.call(itemsToFit, item)) {
                    const element = itemsToFit[item];
                    fitElement(element, 1, 1000);
                    element.classList.remove('fitText');
                }
            }
        }

        function fitElement(element, start, end) {

            let size = (end + start) / 2;
            element.style.fontSize = `${size}px`;

            if (Math.abs(start - end) < 1) {
                while (element.scrollHeight > element.offsetHeight) {
                    size--;
                    element.style.fontSize = `${size}px`;
                }
                return;
            }

            if (element.scrollHeight > element.offsetHeight) {
                fitElement(element, start, size);
            } else {
                fitElement(element, size, end);
            }
        }

        document.onreadystatechange = () => {
            fitElements();
            if (document.readyState === 'complete') {

<li><h2 id="einleitung-metafiction-and-postmodernism">Einleitung: metafiction and postmodernism</h2>
<ul>
<li>Definition und Beispiele für metafiction – Unterschiede: diegesis (Don Quijote, Mme Bovary, À la recherche) vs. language (Finnegan’s Wake, Un homme qui dort) – Konflikte zwischen realistischer mimesis (Geschlossenheit der fiktionalen Welt, „heterocosm”) und dem „Durchbrechen der vierten Wand” sowie nicht-mimetischem Erzählen</li>
<li>Geschichte und Bestimmung von Postmodernismus<ul>
<li>@Gumbrecht-2010: Postmoderne vs. Moderne; Zusammenbrechen der Unterscheidung zwischen Populär- und Hochkultur (Pop-Art); Eklektizismus</li>
<li>@Jameson-1984: spiegelnde Oberflächlichkeit, Eklektizismus und Ahistorizität, Bsp. Architektur</li>
<li>Barth: „literature of exhausted possibility” (&lt; Manierismus/Marino); Bezug auf Borges und die Unoriginalität allen Schreibens; (→ Zitat)</li>
<li>Hutcheons Gründe gegen eine Aufnahme des Begriffs: Metafiktion hat keinen historischen Index</li>
<li>Gegenbegriff lateinamerikanischer Neo-Barock (Severo Sarduy (15))</li>
</ul>

## The Neo-Baroque
- ["] What Sarduy calls contemporary neo-baroque still uses the technical devices of the baroque – that is, linguistic artifice, inter- and intra-textuality, and narrative mirroring. The change in the present usage of these techniques is in intention: the baroque search for consonance is replaced by a willed neo-baroque lack of harmony and homogeneity which is literally, and figuratively revolutionary in its transgressions of contemporary, literary and linguistic norms. (15f.)

## Todorov: Littérature et signification (1957)

<!-- begin::[@Hutcheon-2013.md] -->
- ["] Toute oeuvre, tout roman raconte, à travers la trame événementielle, l’histoire de sa propre création, sa propre histoire. Des oeuvres comme celles de Laclos ou de Proust ne font que rendre explicite une vérité sous-jacente à toute création littéraire. Ainsi apparaît la vanité des recherches du sens dernier de tel roman, de tel drame; le sens d’une oeuvre consiste à se dire, à nous parler de sa propre existence. Ainsi le roman tend à nous amener à lui-même; et nous pouvons dire qu’il commence en fait là où il se termine; car l’existence même du roman est le dernier chaînon de son intrigue, et là où finit l’histoire racontée, l’histoire de la vie, là exactement commence l’histoire racontante, l’histoire littéraire. #Quote #Strukturalismus (25)
<!-- end::[@Hutcheon-2013.md] -->
</div>
