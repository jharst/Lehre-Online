        function pageInIframe() {
            return (window.location !== window.parent.location);
        }

        let forgetPop = true;
        function onPopState(event) {
            if(forgetPop){
                forgetPop = false;
            } else if( pageInIframe()) {
                parent.postMessage(event.target.location.href, "app://obsidian.md");

            }
            forgetPop = true;
        }

        function fitElements() {
            const itemsToFit = document.getElementsByClassName('fitText');
            for (const item in itemsToFit) {
                if (Object.hasOwnProperty.call(itemsToFit, item)) {
                    const element = itemsToFit[item];
                    fitElement(element, 1, 1000);
                    element.classList.remove('fitText');
                }
            }
        }

        function fitElement(element, start, end) {

            let size = (end + start) / 2;
            element.style.fontSize = `${size}px`;

            if (Math.abs(start - end) < 1) {
                while (element.scrollHeight > element.offsetHeight) {
                    size--;
                    element.style.fontSize = `${size}px`;
                }
                return;
            }

            if (element.scrollHeight > element.offsetHeight) {
                fitElement(element, start, size);
            } else {
                fitElement(element, size, end);
            }
        }

        document.onreadystatechange = () => {
            fitElements();
            if (document.readyState === 'complete') {
                if (pageInIframe() && window.location.href.indexOf("?export") != -1){
                    parent.postMessage(event.target.location.href, "app://obsidian.md");
                }
                if (window.location.href.indexOf("print-pdf") != -1){

                        clearInterval(stateCheck);

                    }, 250);

## Rhetorische Topoi
Aristoteles: „Suchformeln” für Ausarbeitung der Rede
- *Topos des Gegensatzes*: „Wenn Krieg das Übel verursacht hat, ist Frieden die Lösung.” – Was für X gilt, gilt für sein Gegenteil entsprechend umgekehrt.
- *Topos der Korrelation*: „Wer rechtmäßig befiehlt, dem darf man rechtmäßig gehorchen." – Wechselseitige Verhältnisse werden argumentativ gespiegelt.
- *Topos der Analogie*: „Wie im Körper Krankheit entsteht, wenn Teile im Ungleichgewicht sind, so im Staat." – Wechselseitige Verhältnisse werden argumentativ gespiegelt.
- *Topos der Konsequenz*: „Wer den Krieg will, muss auch seine Opfer wollen." Aus einer Position werden ihre logischen Folgen gezogen.
</div>
</div></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="has-light-background drop" data-background-color="lightgrey" -->

## Rhetorische Tropen
Aristoteles: Redefiguren („übertragene Bedeutung”)
- Verwendung eines Ausdrucks im übertragenen Sinn durch semantische Verschiebung. 
- *Klassische Tropen*: Metapher (Übertragung nach Ähnlichkeit), Metonymie (nach Kontiguität), Synekdoche (Teil/Ganzes), Ironie (Gegenteil des Gemeinten).
</div>

## Warburg: Bildatlas „Mnemosyne” (1924–29, unvollendet)
- Bildmontage auf 48 Tuchtafeln
- visuelle Kartografie des Nachlebens antiker Pathosformeln 
- Bilder werden nicht beschriftet, sondern durch Nebeneinanderstellung zum Sprechen gebracht
- keine Systematik, keine lineare Erzählung
- bildrhetorischer „Denkraum”
