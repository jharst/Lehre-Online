## Cancik über Freundschaftskult im 18. Jhdt.
- ["] (a) <mark>die (mehr oder weniger) regelmäßigen Feiern</mark> (Bundesfeste, Erneuerung des Bundes, Nachtfeiern); (b) besondere Räume - ein Tempel, Hain oder ein eigenes Zimmer wenigstens; (c) <mark>Riten, symbolische Handlungen und Gesten</mark>: Bruderschaft schwören oder trinken, gemeinsam singen (‚Bundesgesang’, ‚Bundeslied’), Sprüche ausbringen, Festreden halten, die von Jubel und Zurufen unterbrochen werden; <mark>Gedenken der toten Freunde</mark> (Klopstock, ‚Weihtrunk’), gemeinsames Wandern, Besuche, Ausflüge, Austausch von Geschenken, von Briefen, gegebenenfalls von Gedichten; Einträge in Stammbücher; Benutzung von Losungen, Symbolen, geheimnisvollen Abkürzungen; <mark>imaginierte oder auch praktizierte Kultakte</mark> wie Libation oder Versammlung um einen Altar mit Feuer im Freien; (d) Requisiten: Bundesbuch, Stammbuch, Liederbuch (ggf. mit Kompositionen der Freunde); Bilder, Scherenschnitte, Freundschaftsbänder.

<p class="source">Hubert Cancik: „Freundschaftskult”. Religionsgeschichtliche Bemerkungen zu Mythos, Kult und Theologie der Freundschaft bei Friedrich Hölderlin, in: Loyalitätskonflikte in der Religionsgeschichte, hg.v. Christoph Elsas und Hans Kippenberg, Würzburg 1990, S. 30.</p>

</div>

_Zur Frage der Verständlichkeit_. — Man will nicht nur verstanden werden, wenn man schreibt, sondern ebenso gewiss auch nicht verstanden werden. Es ist noch ganz und gar kein Einwand gegen ein Buch, wenn irgend Jemand es unverständlich findet: vielleicht gehörte eben dies zur Absicht seines Schreibers, — er wollte nicht von „irgend Jemand“ verstanden werden. Jeder vornehmere Geist und Geschmack wählt sich, wenn er sich mittheilen will, auch seine Zuhörer; indem er sie wählt, zieht er zugleich gegen „die Anderen“ seine Schranken. Alle feineren Gesetze eines Stils haben da ihren Ursprung: sie halten zugleich ferne, sie schaffen Distanz, sie verbieten „den Eingang“, das Verständniss, wie gesagt, — während sie Denen die Ohren aufmachen, die uns mit den Ohren verwandt sind. (Nietzsche: <em>Fröhliche Wissenschaft</em>, §381)

- ["] Was mich am tiefsten beschäftigt hat, das ist in der That das Problem der décadence, — ich habe Gründe dazu gehabt. „Gut und Böse“ ist nur eine Spielart jenes Problems. Hat man sich für die Abzeichen des Niedergangs ein Auge gemacht, so versteht man auch die Moral, — man versteht, was sich unter ihren heiligsten Namen und Werthformeln versteckt: das verarmte Leben, der Wille zum Ende, die grosse Müdigkeit. **Moral verneint das Leben…** Zu einer solchen Aufgabe war mir eine Selbstdisciplin von Nöthen: — **Partei zu nehmen gegen alles Kranke an mir, eingerechnet Wagner, eingerechnet Schopenhauer, eingerechnet die ganze moderne „Menschlichkeit“**. — Eine tiefe Entfremdung, Erkältung, Ernüchterung gegen alles Zeitliche, Zeitgemässe: und als höchsten Wunsch das Auge Zarathustra’s, ein Auge, das die ganze Thatsache Mensch aus ungeheurer Ferne übersieht, — unter sich sieht… (Vorrede, KSA 6, 12).

<p class="source">Friedrich Nietzsche: <em>Der Fall Wagner</em> (1889). KSA 6, 12.</p>
