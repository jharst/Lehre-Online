    <script type="text/javascript">
        function pageInIframe() {
            return (window.location !== window.parent.location);
        }

        let forgetPop = true;
        function onPopState(event) {
            if(forgetPop){
                forgetPop = false;
            } else if( pageInIframe()) {
                parent.postMessage(event.target.location.href, "app://obsidian.md");
            }
        }
        window.onpopstate = onPopState;
        window.onmessage = event => {
            if(event.data == "reload"){
                window.document.location.reload();
            }
            forgetPop = true;
        }

        function fitElements() {
            const itemsToFit = document.getElementsByClassName('fitText');
            for (const item in itemsToFit) {
                if (Object.hasOwnProperty.call(itemsToFit, item)) {
                    const element = itemsToFit[item];
                    fitElement(element, 1, 1000);
                    element.classList.remove('fitText');
                }
            }
        }

        function fitElement(element, start, end) {

            let size = (end + start) / 2;
            element.style.fontSize = `${size}px`;

            if (Math.abs(start - end) < 1) {
                while (element.scrollHeight > element.offsetHeight) {
                    size--;
                    element.style.fontSize = `${size}px`;
                }
                return;
            }

            if (element.scrollHeight > element.offsetHeight) {
                fitElement(element, start, size);
            } else {
                fitElement(element, size, end);
            }
        }

        document.onreadystatechange = () => {
            fitElements();
            if (document.readyState === 'complete') {
                if (pageInIframe() && window.location.href.indexOf("?export") != -1){
                    parent.postMessage(event.target.location.href, "app://obsidian.md");
                }
                if (window.location.href.indexOf("print-pdf") != -1){
                    let stateCheck = setInterval(() => {
                        clearInterval(stateCheck);
                        window.print();
                    }, 250);
                }
            }
        };
    </script>

„Quae cum ita sint, consuevi inter familiares dicere picturae inventorem fuisse, poetarum sententia, Narcissum illum qui sit in florem versus, nam cum sit omnium artium flos pictura, tum de Narcisso omnis fabula pulchre ad rem ipsam perapta erit. Quid est enim aliud pingere quam arte superficiem illam fontis amplecti?”

„Consequently I used to tell my friends that the inventor of painting, according
to the poets, was Narcissus who was turned into a flower; for, as painting is the flower
of all the arts, so the tale of Narcissus fits our purpose perfectly. What is painting but the act of embracing by means of art the surface of the pool?”

Text: L.B. Alberti, De pictura (1436), 2,26. Bild: Caravaggio: Narziss (1597–1599). Öl auf Leinwand. Galleria Nazionale d’Arte Antica, Rom

# Giambattista Marino: La Galeria (1620)
<split even style="overflow: auto; text-align: left; font-size: smaller; padding-left: 20px !important;">
<div id="poem">
ECO di Ventura Salimbeni.<br>

La bella di Narciso<br>amante desperata<br>qui vedi effigiata.<br>
Vedi il crin, vedi gli occhi e vedi il viso,<br>vedi la bocca replicar gli accenti;<br>ma le voci non senti.<br>
Ben sentiresti ancor le voci istesse,<br>se dipinger la voce si potesse!
</div>

<div id="poem">
ECHO von Ventura Salimbeni.<br>

Die Schönheit des Narziß,<br>enttäuschte Geliebte, [ist es]<br>die du abgebildet siehst.<br>
Du siehst das Haar, du siehst die Augen und siehst das Gesicht,<br>du siehst den Mund die Töne wiedergeben;<br>aber die Laute hörst du nicht.<br>
Wohl würdest du noch die Laute selbst hören,<br>wenn man die Stimme malen könnte!</div></split>

    <script>
        function extend() {
            const target = {};
            for (let i = 0; i < arguments.length; i++) {
                const source = arguments[i];
                for (const key in source) {
                    if (source.hasOwnProperty(key)) {
                        target[key] = source[key];
                    }
                }
            }
            return target;
        }

        function isLight(color) {
            let hex = color.replace('#', '');

            // convert #fff => #ffffff
            if (hex.length == 3) {
                hex = `${hex[0]}${hex[0]}${hex[1]}${hex[1]}${hex[2]}${hex[2]}`;
            }

            const c_r = parseInt(hex.substr(0, 2), 16);
            const c_g = parseInt(hex.substr(2, 2), 16);
            const c_b = parseInt(hex.substr(4, 2), 16);
            const brightness = ((c_r * 299) + (c_g * 587) + (c_b * 114)) / 1000;
            return brightness > 155;
        }

        const bgColor = getComputedStyle(document.documentElement).getPropertyValue('--r-background-color').trim();

        if (isLight(bgColor)) {
            document.body.classList.add('has-light-background');
        } else {
            document.body.classList.add('has-dark-background');
        }

        // default options to init reveal.js
