    <script type="text/javascript">
        function pageInIframe() {
            return (window.location !== window.parent.location);
        }

        let forgetPop = true;
        function onPopState(event) {
            if(forgetPop){
                forgetPop = false;
            } else if( pageInIframe()) {
                parent.postMessage(event.target.location.href, "app://obsidian.md");
            }
        }
        window.onpopstate = onPopState;
        window.onmessage = event => {
            if(event.data == "reload"){
                window.document.location.reload();
            }
            forgetPop = true;
        }

        function fitElements() {
            const itemsToFit = document.getElementsByClassName('fitText');
            for (const item in itemsToFit) {
                if (Object.hasOwnProperty.call(itemsToFit, item)) {
                    const element = itemsToFit[item];
                    fitElement(element, 1, 1000);
                    element.classList.remove('fitText');
                }
            }
        }

        function fitElement(element, start, end) {

            let size = (end + start) / 2;
            element.style.fontSize = `${size}px`;

            if (Math.abs(start - end) < 1) {
                while (element.scrollHeight > element.offsetHeight) {
                    size--;
                    element.style.fontSize = `${size}px`;
                }
                return;
            }

            if (element.scrollHeight > element.offsetHeight) {
                fitElement(element, start, size);
            } else {
                fitElement(element, size, end);
            }
        }

        document.onreadystatechange = () => {
            fitElements();
            if (document.readyState === 'complete') {
                if (pageInIframe() && window.location.href.indexOf("?export") != -1){
                    parent.postMessage(event.target.location.href, "app://obsidian.md");
                }
                if (window.location.href.indexOf("print-pdf") != -1){
                    let stateCheck = setInterval(() => {
                        clearInterval(stateCheck);
                        window.print();
                    }, 250);
                }
            }
        };

## Exordium

<!-- begin::[Ovid-Met-Anfang.md] -->
- ["] Von Gestalten zu künden, die in neue Körper verwandelt wurden, treibt mich der Geist. Ihr Götter – habt ihr doch jene Verwandlungen bewirkt –, beflügelt mein Beginnen und führt meine Dichtung ununterbrochen vom allerersten Ursprung der Welt bis zu meiner Zeit! (I,1–4)
<!-- end::[Ovid-Met-Anfang.md] -->



</div>
</div>

<aside class="notes"><ul>
<li>Universalgeschichte: Vom Ursprung der Welt bis zur Gegenwart (Augustus!) – Vergleich mit Vergil: Aeneis als Staatsepos des römischen Imperiums – auch bei Ovid scheint die Kette der Verwandlungen in der Gegenwart beendet zu sein (or is it?? → Bedrohung der Augusteischen Ordnung)</li>
<li>„ununterbrochen”: <ul>
<li>Verwandlung als verknüpfendes Prinzip, Kontinuität, keine Brüche in der Geschichte, alles hat sich linear aus dem Ursprung entwickelt;</li>
<li>zugleich ist die Verwandlung natürlich auch ein Bruch, radikale Transformation</li>
</ul>
</li>
<li>weitere sekundäre Motive: Aitiologie (Ursprungsmythen) </li>
<li>Parallele zwischen Verwandlung und dichterischer Gestaltung?<!-- .slide: class="has-dark-background" data-background-color="black" --></li>
</ul>
</aside></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->

## Schöpfungsgeschichte

<!-- begin::[Ovid-Met-Anfang.md] -->
- ["] Ehe es Meer, Land und den allumschließenden Himmel gab, hatte die ganze Natur ringsum einerlei Aussehen; man nannte es Chaos: eine rohe, ungeordnete Masse, nichts als träges Gewicht und auf einen Haufen zusammengeworfene, im Widerstreit befindliche Samen von Dingen, ohne rechten Zusammenhang. Noch kein Titan spendete der Welt Licht, keine Phoebe ließ ihr Mondhorn immer wieder aufs neue nachwachsen. \[…\] Keinem Ding blieb die eigene Gestalt \[…\] (I,5–20)
<!-- end::[Ovid-Met-Anfang.md] -->



</div>
</div>

<aside class="notes"><ul>
<li>ursprüngliches Chaos: Trägt bereits den Keim der Verwandlung in sich</li>
<li>unterscheidendes Eintreten des Schöpfungsgottes (ohne Namen): Etabliert Ordnung (Elemente, Himmel/Erde), führt aber eigentlich Verwandlung weiter<!-- .slide: class="has-dark-background" data-background-color="black" --></li>
</ul>
</aside></script></section><section  data-markdown><script type="text/template"><!-- .slide: class="drop" -->

## Schöpfungsgeschichte

<!-- begin::[Ovid-Met-Anfang.md] -->
- ["] Noch fehlte ein Lebewesen, heiliger als diese, fähiger, den hohen Geist aufzunehmen, und berufen, die übrigen zu beherrschen. Es entstand der Mensch, sei es, daß ihn aus göttlichem Samen jener Weltschöpfer schuf, der Ursprung der besseren Welt, sei es, daß die junge Erde, erst kürzlich vom hohen Äther getrennt, noch Samen des verwandten Himmels zurückbehielt; diese mischte der Sproß des lapetus \[= Prometheus\] mit Regenwasser und formte sie zum Ebenbild der alles lenkenden Götter. Und während die übrigen Lebewesen nach vorn geneigt zur Erde blicken, gab er dem Menschen ein emporblickendes Antlitz, gebot ihm, den Himmel zu sehen und das Gesicht aufrecht zu den Sternen zu erheben. So nahm die Erde, die eben noch roh und gestaltlos gewesen war, verwandelt die bisher unbekannten menschlichen Formen an. (I,76–88)
<!-- end::[Ovid-Met-Anfang.md] -->



</div>
</div>

<aside class="notes"><ul>
<li>Schöpfung des Menschen: <ul>
<li>Zwei Alternativen, am Ende wird die Schöpfung aus Zufall (Prometheus) bevorzugt</li>
<li>Attribute des Menschen, Bedeutung des aufrechten Ganges</li>
</ul>
</li>
<li>Am Ende wird die ganze Schöpfungsgeschichte als Verwandlung bezeichnet<!-- .slide: class="has-dark-background" data-background-color="black" --></li>
</ul>

            for (let i = 0; i < arguments.length; i++) {
